version: '3'
services:
  backend:
    build:
      context: .
    command: sh - c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "6767:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    volumes:
      - redis_data:/data

  celery_worker:
    build:
      context: .
    command: celery -A shop_api worker -I INFO
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis

  celery_beat:
    build:
      context: .
    command: celery -A shop_api beat -I INFO
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis

  celery_flower:
    build:
      context: .
    command: celery -A shop_api flower -I INFO
    ports:
      - "5556:5555"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis


volumes:
  db_data:
  redis_data: